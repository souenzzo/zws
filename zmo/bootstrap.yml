---
- name: "Bootstrap zmo: a self-replicant machine config"
  hosts: "localhost"
  tasks:
    - register: zws
      name: "Clone remote code"
      ansible.builtin.git:
        repo: "https://github.com/souenzzo/zws"
        dest: "{{ lookup('env', 'HOME') }}/zws"
        single_branch: yes
        version: "main"

    - name: "On git change"
      when: zws.changed
      block:
        - name: "setup bootstrap"
          ansible.builtin.import_tasks: "install.yml"
        - name: "Reload configs"
          ansible.builtin.systemd:
            daemon_reload: yes
            scope: "user"
        - name: "Start zmo service"
          ansible.builtin.systemd:
            state: started
            name: "zmo.service"
            scope: "user"
